name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build and upload artifacts for"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_DIST_VERSION: 0.31.0

jobs:
  plan:
    name: Plan release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release-target.outputs.tag }}
      ref: ${{ steps.release-target.outputs.ref }}
      host_steps: ${{ steps.release-target.outputs.host_steps }}
    steps:
      - name: Resolve release target
        id: release-target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
            host_steps="upload"
          else
            tag="${{ github.ref_name }}"
            host_steps="create,upload"
          fi

          if [ -z "$tag" ]; then
            echo "release tag is required" >&2
            exit 1
          fi

          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"
          printf 'ref=refs/tags/%s\n' "$tag" >> "$GITHUB_OUTPUT"
          printf 'host_steps=%s\n' "$host_steps" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release-target.outputs.ref }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-dist
        shell: bash
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v${CARGO_DIST_VERSION}/cargo-dist-installer.sh | sh

      - name: Generate release manifest
        run: |
          dist manifest --tag "${{ steps.release-target.outputs.tag }}" --artifacts=all --no-local-paths --output-format=json > dist-manifest.json

  build-local-artifacts:
    name: Build ${{ matrix.target }} artifacts
    needs: plan
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            runner: macos-13
          - target: aarch64-apple-darwin
            runner: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.plan.outputs.ref }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-dist
        shell: bash
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v${CARGO_DIST_VERSION}/cargo-dist-installer.sh | sh

      - name: Build local artifacts
        run: |
          dist build --tag "${{ needs.plan.outputs.tag }}" --target "${{ matrix.target }}" --artifacts=local

      - name: Upload local artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: target/distrib/*
          if-no-files-found: error

  build-global-artifacts:
    name: Build global release assets
    needs: plan
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.plan.outputs.ref }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-dist
        shell: bash
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v${CARGO_DIST_VERSION}/cargo-dist-installer.sh | sh

      - name: Build global artifacts
        run: |
          dist build --tag "${{ needs.plan.outputs.tag }}" --artifacts=global

      - name: Upload global artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-global
          path: target/distrib/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs:
      - build-local-artifacts
      - build-global-artifacts
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.plan.outputs.ref }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-dist
        shell: bash
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v${CARGO_DIST_VERSION}/cargo-dist-installer.sh | sh

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: target/distrib
          pattern: dist-*
          merge-multiple: true

      - name: Publish GitHub release assets
        run: |
          dist host --steps="${{ needs.plan.outputs.host_steps }}" --tag "${{ needs.plan.outputs.tag }}"
